<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RehabFlow</title>

  <style>
    body {
      font-family: Arial;
      background: #f6f7fb;
      text-align: center;
      padding: 40px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 12px;
      display: inline-block;
      min-width: 300px;
    }
  </style>
</head>

<body>

<h1>RehabFlow</h1>

<div id="app"></div>

<script>
const data = {
  "Omuz": "Omuz egzersizleri: pendulum, mobilizasyon",
  "Diz": "Diz egzersizleri: ACL, menisküs, güçlendirme",
  "Boyun": "Boyun egzersizleri: chin tuck, postür"
};

let step = "home";
let selected = "";

function render() {
  const app = document.getElementById("app");

  if(step === "home") {
    app.innerHTML = `
      <button onclick="step='regions'; render()">Başla</button>
    `;
  }

  if(step === "regions") {
    app.innerHTML = `
      <h2>Bölge Seç</h2>
      ${Object.keys(data).map(d => `
        <button onclick="select('${d}')">${d}</button>
      `).join("")}
      <button onclick="step='home'; render()">Geri</button>
    `;
  }

  if(step === "detail") {
    app.innerHTML = `
      <h2>${selected}</h2>
      <div class="card">${data[selected]}</div>
      <button onclick="step='regions'; render()">Geri</button>
    `;
  }
}

function select(d) {
  selected = d;
  step = "detail";
  render();
}

render();
</script>

</body>
</html>
